name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

concurrency:
  group: rust-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  rust-gates:
    name: Rust gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          case "${GITHUB_REF_NAME}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Invalid release tag: ${GITHUB_REF_NAME}"; exit 1 ;;
          esac
          if ! printf '%s' "${GITHUB_REF_NAME}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid release tag: ${GITHUB_REF_NAME}"
            exit 1
          fi
          git fetch origin main --depth=1
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Check build
        run: cargo check --locked

      - name: Run tests
        run: cargo test --locked

  build:
    name: Build ${{ matrix.target }}
    needs: rust-gates
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: port-mcp.exe
            archive: zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: port-mcp
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            binary: port-mcp
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            binary: port-mcp
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare archive directory
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary }}
        run: |
          if ($env:RELEASE_TAG -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Invalid release tag: $env:RELEASE_TAG"
          }
          $version = $env:RELEASE_TAG
          $target = $env:TARGET
          $package = "port-mcp-$version-$target"
          New-Item -ItemType Directory -Force -Path "dist/$package" | Out-Null
          Copy-Item "target/$target/release/$env:BINARY" "dist/$package/$env:BINARY"
          "package=$package" >> $env:GITHUB_ENV

      - name: Create zip archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path "dist/$env:package/*" -DestinationPath "dist/$env:package.zip"

      - name: Create tar archive
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: tar -C "dist/$package" -czf "dist/$package.tar.gz" .

      - name: Generate checksum
        shell: pwsh
        run: |
          $archive = if ('${{ matrix.archive }}' -eq 'zip') { "dist/$env:package.zip" } else { "dist/$env:package.tar.gz" }
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
          $name = Split-Path $archive -Leaf
          "$hash  $name" | Set-Content -NoNewline "$archive.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: port-mcp-${{ github.ref_name }}-${{ matrix.target }}
          path: |
            dist/*.zip
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: port-mcp ${{ github.ref_name }}
          generate_release_notes: true
          files: release-artifacts/*
          fail_on_unmatched_files: true
